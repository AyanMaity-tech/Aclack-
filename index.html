<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYAN OS - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h1 class="logo">AYAN <span>OS</span></h1>
        <p>Welcome to Ayan Infinity System</p>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button class="btn-login" onclick="handleLogin()">LOGIN</button>
        <button class="btn-signup" onclick="handleSignUp()">SIGN UP</button>
        <p id="message"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="login.js"></script>
</body>
</html>
